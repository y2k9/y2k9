  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {

    /* ── Sidebar ─────────────────────────────────────────── */
    #sidebar {
      width: 272px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid #1c1c1c;
      z-index: 10;
    }

    #sidebar-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid #1c1c1c;
      flex-shrink: 0;
    }

    #back-link {
      display: inline-block;
      font-size: 10px;
      color: #444;
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 12px;
      transition: color 0.15s;
    }
    #back-link:hover { color: #888; }

    #sidebar-header h1 {
      font-size: 14px;
      font-weight: 500;
      color: #e8e8e8;
      letter-spacing: -0.02em;
    }

    #sidebar-header p {
      font-size: 11px;
      color: #444;
      margin-top: 4px;
      line-height: 1.55;
    }

    /* ── Object list ─────────────────────────────────────── */
    #objects-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    #objects-list::-webkit-scrollbar { width: 0; }

    .object-card {
      padding: 13px 20px 13px 18px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.12s, border-color 0.12s;
    }
    .object-card:hover { background: #0f0f0f; }
    .object-card.selected {
      background: #0f0f0f;
      border-left-color: #e8e8e8;
    }

    .card-name {
      font-size: 13px;
      font-weight: 500;
      color: #d8d8d8;
      letter-spacing: -0.015em;
    }
    .card-sub {
      font-size: 11px;
      color: #444;
      margin-top: 2px;
    }
    .object-card.selected .card-sub { color: #666; }

    .card-desc {
      font-size: 11px;
      color: #555;
      line-height: 1.55;
      margin-top: 8px;
      display: none;
    }
    .object-card.selected .card-desc { display: block; }

    .card-coords {
      font-size: 10px;
      color: #383838;
      margin-top: 7px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      display: none;
    }
    .object-card.selected .card-coords { display: block; }

    /* ── Footer ──────────────────────────────────────────── */
    #sidebar-footer {
      padding: 11px 20px;
      border-top: 1px solid #1c1c1c;
      font-size: 10px;
      color: #2e2e2e;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    /* ── Map ─────────────────────────────────────────────── */
    #map { flex: 1; height: 100%; touch-action: none; }

    .maplibregl-ctrl-bottom-right { display: none; }
    .maplibregl-ctrl-bottom-left  { display: none; }
    .maplibregl-ctrl-top-right    { display: none; }

    .maplibregl-canvas { outline: none; touch-action: none; }

    /* ── Compass ─────────────────────────────────────────── */
    #compass {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 32px;
      height: 32px;
      z-index: 20;
      cursor: pointer;
      opacity: 0.45;
      transition: opacity 0.2s;
    }
    #compass:hover { opacity: 0.85; }
    #compass svg { display: block; }
  </style>
</head>

// ── Build sidebar cards ───────────────────────────────────
const list = document.getElementById("objects-list");

OBJECTS.forEach(obj => {
  const card = document.createElement("div");
  card.className = "object-card";
  card.id = `card-${obj.id}`;
  card.innerHTML = `
    <div class="card-name">${obj.name}</div>
    <div class="card-sub">${obj.subtitle}</div>
    <div class="card-desc">${obj.description}</div>
    <div class="card-coords">${formatCoord(obj.lat, "NS")} &nbsp; ${formatCoord(obj.lng, "EW")}</div>
  `;
  card.addEventListener("click", () => selectObject(obj.id));
  list.appendChild(card);
});

function formatCoord(val, axis) {
  const dir = axis === "NS" ? (val >= 0 ? "N" : "S") : (val >= 0 ? "E" : "W");
  return `${Math.abs(val).toFixed(3)}° ${dir}`;
}

// ── Map ───────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: "map",
  style: {
    version: 8,
    sources: {
      satellite: {
        type: "raster",
        tiles: [
          "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
        ],
        tileSize: 256,
        maxzoom: 19,
        attribution: "© Esri, Maxar, Earthstar Geographics",
      },
    },
    layers: [{
      id: "satellite",
      type: "raster",
      source: "satellite",
    }],
  },
  projection: "globe",
  center: [20, 18],
  zoom: 1.6,
  maxZoom: 18,
  minZoom: 1,
  dragRotate: true,
  touchZoomRotate: true,
  cooperativeGestures: false,
  attributionControl: false,
});

let selectedId = null;

map.on("load", () => {
  try { map.setProjection("globe"); } catch (_) {}

  try { map.touchZoomRotate.enableRotation(); } catch (_) {}

  try {
    map.setFog({
      range: [1, 10],
      color: "#0a0a0a",
      "high-color": "#080814",
      "horizon-blend": 0.03,
      "space-color": "#0a0a0a",
      "star-intensity": 0.25,
    });
  } catch (_) {}
});

// Rotate compass needle as bearing changes
map.on("rotate", () => {
  const bearing = map.getBearing();
  document.getElementById("compass-needle").style.transform = `rotate(${bearing}deg)`;
});

// ── Selection ─────────────────────────────────────────────
function selectObject(id) {
  const obj = OBJECTS.find(o => o.id === id);
  if (!obj) return;

  if (selectedId && selectedId !== id) {
    document.getElementById(`card-${selectedId}`).classList.remove("selected");
  }

  const alreadySelected = selectedId === id;
  selectedId = id;
  document.getElementById(`card-${id}`).classList.add("selected");

  if (!alreadySelected) {
    map.flyTo({
      center: [obj.lng, obj.lat],
      zoom: obj.zoom,
      duration: 2800,
      curve: 1.42,
      essential: true,
    });
  }
}
