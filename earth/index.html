  { id: "baja_whirlpool", name: "Ocean Spiral", subtitle: "Coastal tidal pattern · Mexico", description: "Currents and sediments create giant swirling ocean patterns.", lat: 31.738, lng: -114.727, zoom: 8.0 },
  { id: "paris_star", name: "Urban Starburst", subtitle: "Radial city layout · France", description: "Paris avenues radiate outward like a geometric star pattern.", lat: 48.873, lng: 2.295, zoom: 12.0 },
  { id: "tokyo_grid", name: "Neon Circuit", subtitle: "Dense urban grid · Japan", description: "Tokyo's urban density resembles intricate motherboard circuitry.", lat: 35.676, lng: 139.650, zoom: 11.0 },
  { id: "alberta_tar_patterns", name: "Oil Abstract", subtitle: "Tailings pond formations · Canada", description: "Industrial extraction ponds create surreal abstract color compositions.", lat: 57.102, lng: -111.642, zoom: 10.0 },
];

// ── Tag all initial objects as ChatGPT-sourced ───────────
OBJECTS.forEach(o => o.source = "chatgpt");

// ── User objects (persisted in localStorage) ──────────────
function loadUserObjects() {
  try { return JSON.parse(localStorage.getItem("earth_user_objects") || "[]"); }
  catch { return []; }
}
function saveUserObjects() {
  localStorage.setItem("earth_user_objects", JSON.stringify(userObjects));
}
let userObjects = loadUserObjects();

function allObjects() { return [...userObjects, ...OBJECTS]; }

// ── Sidebar rendering ─────────────────────────────────────
const list   = document.getElementById("objects-list");
const footer = document.getElementById("sidebar-footer");

function renderSidebar() {
  list.innerHTML = "";
  if (userObjects.length > 0) appendSection("My Additions", userObjects);
  appendSection("ChatGPT Suggestions", OBJECTS);
  footer.innerHTML = `${allObjects().length} objects &nbsp;·&nbsp; imagery © Esri`;
  if (selectedId) {
    const card = document.getElementById(`card-${selectedId}`);
    if (card) card.classList.add("selected");
  }
}

function appendSection(label, objects) {
  const hdr = document.createElement("div");
  hdr.className = "section-header";
  hdr.textContent = `${label} (${objects.length})`;
  list.appendChild(hdr);
  objects.forEach(obj => {
    const card = document.createElement("div");
    card.className = "object-card";
    card.id = `card-${obj.id}`;
    card.innerHTML = `
      <div class="card-name">${obj.name}</div>
      <div class="card-sub">${obj.subtitle}</div>
      <div class="card-desc">${obj.description || ""}</div>
      <div class="card-coords">${formatCoord(obj.lat, "NS")} &nbsp; ${formatCoord(obj.lng, "EW")}</div>
    `;
    card.addEventListener("click", () => selectObject(obj.id));
    list.appendChild(card);
  });
}

function formatCoord(val, axis) {
  const dir = axis === "NS" ? (val >= 0 ? "N" : "S") : (val >= 0 ? "E" : "W");
  return `${Math.abs(val).toFixed(3)}° ${dir}`;
}

renderSidebar();

// ── Map ───────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: "map",
  style: {
    version: 8,
    sources: {
      satellite: {
        type: "raster",
        tiles: [
          "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
        ],
        tileSize: 256,
        maxzoom: 19,
        attribution: "© Esri, Maxar, Earthstar Geographics",
      },
    },
    layers: [{
      id: "satellite",
      type: "raster",
      source: "satellite",
    }],
    projection: { type: "globe" },
  },
  projection: "globe",
  center: [20, 18],
  zoom: 1.6,
  maxZoom: 18,
  minZoom: 1,
  dragRotate: true,
  touchZoomRotate: true,
  cooperativeGestures: false,
  attributionControl: false,
});

let selectedId = null;

map.on("load", () => {
  try { map.setProjection("globe"); } catch (_) {}

  try { map.touchZoomRotate.enableRotation(); } catch (_) {}

  try {
    map.setFog({
      range: [1, 10],
      color: "#0a0a0a",
      "high-color": "#080814",
      "horizon-blend": 0.03,
      "space-color": "#0a0a0a",
      "star-intensity": 0.25,
    });
  } catch (_) {}
});

// Compass needle tracks bearing
map.on("rotate", () => {
  document.getElementById("compass-needle").style.transform = `rotate(${map.getBearing()}deg)`;
});

// Live coordinates
const coordsEl = document.getElementById("coords");
map.on("mousemove", (e) => {
  const { lat, lng } = e.lngLat;
  const la = `${Math.abs(lat).toFixed(4)}° ${lat >= 0 ? "N" : "S"}`;
  const lo = `${Math.abs(lng).toFixed(4)}° ${lng >= 0 ? "E" : "W"}`;
  coordsEl.textContent = `${la}  ${lo}`;
});
map.on("mouseleave", () => { coordsEl.textContent = "— °  — °"; });

// ── Selection ─────────────────────────────────────────────
function selectObject(id) {
  const obj = allObjects().find(o => o.id === id);
  if (!obj) return;

  if (selectedId && selectedId !== id) {
    const prev = document.getElementById(`card-${selectedId}`);
    if (prev) prev.classList.remove("selected");
  }

  const alreadySelected = selectedId === id;
  selectedId = id;
  const card = document.getElementById(`card-${id}`);
  if (card) card.classList.add("selected");

  if (!alreadySelected) {
    map.flyTo({
      center: [obj.lng, obj.lat],
      zoom: obj.zoom,
      duration: 2800,
      curve: 1.42,
      essential: true,
    });
  }
}

// ── Add mode ──────────────────────────────────────────────
let addMode = false;
let pendingAdd = null;

function toggleAddMode() {
  addMode = !addMode;
  document.getElementById("add-mode-btn").classList.toggle("active", addMode);
  map.getCanvas().style.cursor = addMode ? "crosshair" : "";
  document.getElementById("add-hint").style.display = addMode ? "block" : "none";
}

map.on("click", async (e) => {
  if (!addMode) return;

  const { lat, lng } = e.lngLat;
  const zoom = parseFloat(map.getZoom().toFixed(1));
  pendingAdd = { lat, lng, zoom };

  document.getElementById("add-form-meta").textContent =
    `${formatCoord(lat, "NS")}  ${formatCoord(lng, "EW")}  ·  zoom ${zoom}`;
  document.getElementById("form-name").value = "";
  document.getElementById("form-subtitle").value = "";
  document.getElementById("add-modal").classList.remove("hidden");
  setTimeout(() => document.getElementById("form-name").focus(), 50);

  // Reverse geocode in background — fill subtitle when ready
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=10`,
      { headers: { "Accept-Language": "en" } }
    );
    const data = await res.json();
    const addr = data.address || {};
    const place = addr.city || addr.town || addr.village || addr.county || addr.state || "";
    const country = addr.country || "";
    const suggestion = [place, country].filter(Boolean).join(", ");
    const subInput = document.getElementById("form-subtitle");
    if (suggestion && !subInput.value) subInput.value = suggestion;
  } catch (_) {}
});

function saveObject() {
  const name = document.getElementById("form-name").value.trim();
  if (!name || !pendingAdd) { document.getElementById("form-name").focus(); return; }

  const newObj = {
    id: "user_" + Date.now(),
    name,
    subtitle: document.getElementById("form-subtitle").value.trim() || "User addition",
    description: "",
    lat: pendingAdd.lat,
    lng: pendingAdd.lng,
    zoom: pendingAdd.zoom,
    source: "user",
  };

  userObjects.unshift(newObj);
  saveUserObjects();
  closeAddForm();
  renderSidebar();
  selectObject(newObj.id);
}

function closeAddForm() {
  document.getElementById("add-modal").classList.add("hidden");
  pendingAdd = null;
}

document.addEventListener("keydown", (e) => {
  if (document.getElementById("add-modal").classList.contains("hidden")) return;
  if (e.key === "Escape") closeAddForm();
  if (e.key === "Enter") saveObject();
});
</script>

</body>
</html>
