<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earthgazing — y2k9</title>
  <link rel="icon" type="image/jpeg" href="../favicon.jpg" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    #sidebar {
      position: fixed;
      left: 16px;
      top: 16px;
      bottom: 16px;
      width: 272px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #ffffff;
      border: 1px solid #ede9e4;
      border-radius: 14px;
      z-index: 10;
      box-shadow: 0 4px 28px rgba(0,0,0,0.22);
    }

    #sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid #f0ece7;
      flex-shrink: 0;
    }

    #back-link {
      display: inline-block;
      font-size: 10px;
      color: #c8c2bb;
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 14px;
      transition: color 0.15s;
    }
    #back-link:hover { color: #e8724a; }

    #sidebar-header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: -0.03em;
    }

    #sidebar-header p {
      font-size: 11.5px;
      color: #aaa;
      margin-top: 5px;
      line-height: 1.6;
    }

    /* ── Object list ─────────────────────────────────────── */
    #objects-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    #objects-list::-webkit-scrollbar { width: 0; }

    .object-card {
      padding: 14px 20px 14px 18px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.12s, border-color 0.12s;
    }
    .object-card:hover { background: #faf8f6; }
    .object-card.selected {
      background: #fff8f5;
      border-left-color: #e8724a;
    }

    .card-name {
      font-size: 13px;
      font-weight: 500;
      color: #1a1a1a;
      letter-spacing: -0.01em;
    }

    .card-desc {
      font-size: 11.5px;
      color: #999;
      line-height: 1.55;
      margin-top: 4px;
    }

    .card-where {
      margin-top: 7px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .card-loc {
      font-size: 11px;
      color: #c8c2bb;
    }
    .object-card.selected .card-loc { color: #e8724a; }

    .card-edit {
      font-size: 9px;
      color: #d0cbc5;
      cursor: pointer;
      margin-left: 8px;
      display: none;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      vertical-align: middle;
      transition: color 0.15s;
    }
    .object-card.selected .card-edit { display: inline; }
    .card-edit:hover { color: #e8724a; }

    .card-coords {
      font-size: 10px;
      color: #d0cbc5;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      display: none;
    }
    .object-card.selected .card-coords { display: block; }

    /* ── Footer ──────────────────────────────────────────── */
    #sidebar-footer {
      padding: 11px 20px;
      border-top: 1px solid #f0ece7;
      font-size: 10px;
      color: #c8c2bb;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    /* ── Map ─────────────────────────────────────────────── */
    #map { position: fixed; inset: 0; touch-action: none; }

    .maplibregl-ctrl-bottom-right { display: none; }
    .maplibregl-ctrl-bottom-left  { display: none; }
    .maplibregl-ctrl-top-right    { display: none; }

    .maplibregl-canvas { outline: none; touch-action: none; }

    /* ── Bottom bar (wrapper) ────────────────────────────── */
    #bottom-bar {
      position: fixed;
      bottom: 20px;
      left: calc(304px + (100vw - 304px) / 2);
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    /* ── Info bar ────────────────────────────────────────── */
    #info-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #ffffff;
      border: 1px solid #ede9e4;
      border-radius: 8px;
      padding: 7px 14px 7px 10px;
      pointer-events: none;
      box-shadow: 0 2px 14px rgba(0,0,0,0.14);
    }

    #compass-btn {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      cursor: pointer;
      pointer-events: auto;
      opacity: 0.55;
      transition: opacity 0.15s;
    }
    #compass-btn:hover { opacity: 1; }
    #compass-btn svg { display: block; }

    #coords-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #location-name {
      font-size: 11px;
      color: #555;
      letter-spacing: 0.01em;
      white-space: nowrap;
      min-height: 1.2em;
      transition: opacity 0.2s ease;
      font-weight: 500;
    }
    #location-name.fading { opacity: 0.3; }

    #coords {
      font-size: 10.5px;
      color: #bbb;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* ── Sidebar header row ──────────────────────────────── */
    #sidebar-title-row { margin-top: 10px; }

    /* ── Add button ─────────────────────────────────────── */
    #add-bar-btn {
      width: 32px;
      height: 32px;
      background: #ffffff;
      border: 1px solid #ede9e4;
      border-radius: 8px;
      color: #c8c2bb;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      pointer-events: auto;
      box-shadow: 0 2px 14px rgba(0,0,0,0.14);
      transition: color 0.15s, border-color 0.15s;
    }
    #add-bar-btn:hover { color: #e8724a; border-color: #e8724a; }
    #add-bar-btn.active { background: #e8724a; color: #fff; border-color: #e8724a; }

    /* ── Section headers ─────────────────────────────────── */
    .section-header {
      padding: 12px 20px 5px;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #d0cbc5;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-export {
      font-size: 9px;
      color: #d0cbc5;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.15s;
    }
    .section-export:hover { color: #e8724a; }

    /* ── Add mode hint ───────────────────────────────────── */
    #add-hint {
      position: fixed;
      top: 24px;
      left: calc(304px + (100vw - 304px) / 2);
      transform: translateX(-50%);
      background: #ffffff;
      border: 1px solid #ede9e4;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 11px;
      color: #888;
      pointer-events: none;
      z-index: 20;
      display: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    /* ── Add form modal ──────────────────────────────────── */
    #add-modal {
      position: fixed;
      top: 0; bottom: 0;
      left: 304px; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(2px);
    }
    #add-modal.hidden { display: none; }

    #add-form {
      background: #ffffff;
      border: 1px solid #ede9e4;
      border-radius: 12px;
      padding: 22px;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 8px 36px rgba(0,0,0,0.16);
    }
    #add-form-title {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 2px;
    }
    #add-form-meta {
      font-size: 10px;
      color: #bbb;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
    }
    #add-form input, #add-form textarea {
      background: #faf8f6;
      border: 1px solid #ede9e4;
      border-radius: 6px;
      color: #1a1a1a;
      font-size: 12.5px;
      padding: 9px 11px;
      outline: none;
      width: 100%;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    #add-form input::placeholder,
    #add-form textarea::placeholder { color: #ccc; }
    #add-form input:focus,
    #add-form textarea:focus { border-color: #e8724a; }
    #add-form textarea { resize: none; line-height: 1.5; }
    #add-form-actions {
      display: flex;
      gap: 8px;
      margin-top: 2px;
    }
    #add-form-actions button {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #ede9e4;
      transition: all 0.15s;
    }
    #form-cancel { background: transparent; color: #aaa; }
    #form-cancel:hover { color: #555; border-color: #ccc; }
    #form-save { background: #e8724a; color: #fff; border-color: #e8724a; font-weight: 500; }
    #form-save:hover { background: #d4603a; border-color: #d4603a; }

    /* ── Mobile UI (hidden on desktop) ──────────────────── */
    #mobile-title, #mobile-strip { display: none; }

    @media (max-width: 768px) {
      /* Hide all desktop chrome */
      #sidebar, #bottom-bar, #add-hint, #add-modal { display: none !important; }

      /* Floating title */
      #mobile-title {
        display: block;
        position: fixed;
        top: 54px;
        left: 20px;
        font-size: 17px;
        font-weight: 600;
        color: #fff;
        letter-spacing: -0.02em;
        text-shadow: 0 1px 12px rgba(0,0,0,0.45);
        z-index: 10;
        pointer-events: none;
        line-height: 1.3;
      }
      #mobile-subtitle {
        display: block;
        font-size: 11px;
        font-weight: 400;
        color: rgba(255,255,255,0.55);
        letter-spacing: 0.01em;
        text-shadow: 0 1px 8px rgba(0,0,0,0.4);
        margin-top: 2px;
      }

      /* Floating card strip */
      #mobile-strip {
        display: flex;
        flex-direction: column;
        gap: 10px;
        position: fixed;
        bottom: 44px;
        left: 0;
        right: 0;
        z-index: 10;
      }

      /* Location label above cards */
      #mobile-location-label {
        display: block;
        text-align: center;
        font-size: 12px;
        font-weight: 500;
        color: #fff;
        text-shadow: 0 1px 10px rgba(0,0,0,0.55);
        letter-spacing: 0.01em;
        min-height: 1.4em;
        transition: opacity 0.2s;
      }

      /* Horizontal scroll */
      #mobile-cards {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding: 6px calc(50vw - 120px);
      }
      #mobile-cards::-webkit-scrollbar { display: none; }

      /* Individual floating card */
      .mobile-card {
        min-width: 240px;
        max-width: 240px;
        background: #fff;
        border-radius: 16px;
        padding: 16px 18px;
        scroll-snap-align: center;
        flex-shrink: 0;
        box-shadow: 0 6px 28px rgba(0,0,0,0.2);
        border-left: 3px solid transparent;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
      }
      .mobile-card.active {
        border-left-color: #e8724a;
        background: #fff9f7;
      }
      .mobile-card-name {
        font-size: 13.5px;
        font-weight: 600;
        color: #1a1a1a;
        letter-spacing: -0.01em;
        margin-bottom: 4px;
      }
      .mobile-card-desc {
        font-size: 11px;
        color: #aaa;
        line-height: 1.5;
      }
    }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <a id="back-link" href="../">← y2k9</a>
    <div id="sidebar-title-row">
      <h1>Earthgazing</h1>
    </div>
    <p>Come find random shaped objects on Earth :) add them to the library</p>
  </div>
  <div id="objects-list"></div>
  <div id="sidebar-footer">68 objects &nbsp;·&nbsp; imagery © Esri</div>
</div>

<div id="map"></div>

<div id="mobile-title">Earthgazing<span id="mobile-subtitle">stargazing, but for Earth</span></div>
<div id="mobile-strip">
  <div id="mobile-location-label"></div>
  <div id="mobile-cards"></div>
</div>

<div id="add-hint">Click anywhere on the map to place an object</div>

<div id="add-modal" class="hidden">
  <div id="add-form">
    <div id="add-form-title">New object</div>
    <div id="add-form-meta"></div>
    <input id="form-name" type="text" placeholder="Name  (e.g. The Eye)" autocomplete="off" />
    <textarea id="form-desc" rows="3" placeholder="Description (optional)"></textarea>
    <div id="add-form-actions">
      <button id="form-cancel" onclick="closeAddForm()">Cancel</button>
      <button id="form-save" onclick="saveObject()">Save</button>
    </div>
  </div>
</div>

<div id="bottom-bar">
  <div id="info-bar">
    <div id="compass-btn" title="Reset north" onclick="map.resetNorth({ duration: 500 })">
      <svg id="compass-needle" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="11,2 13,11 11,9.5 9,11" fill="#333"/>
        <polygon points="11,20 13,11 11,12.5 9,11" fill="#ddd"/>
        <circle cx="11" cy="11" r="1.2" fill="#bbb"/>
      </svg>
    </div>
    <div id="coords-group">
      <span id="location-name"></span>
      <span id="coords">— °  — °</span>
    </div>
  </div>
  <button id="add-bar-btn" title="Add mode" onclick="toggleAddMode()">+</button>
</div>

<script>
const OBJECTS = [
  { id: "guitar_lake", name: "The Guitar", subtitle: "Guitar-shaped forest plantation · Argentina", description: "A massive tree plantation carefully arranged in the shape of a guitar.", lat: -33.867, lng: -63.987, zoom: 11.0 },
  { id: "elephant_rock", name: "Stone Elephant", subtitle: "Elephant-shaped rock formation · Iceland", description: "A coastal basalt cliff that resembles a giant elephant dipping its trunk into the sea.", lat: 63.442, lng: -20.288, zoom: 13.0 },
  { id: "rabbit_island", name: "The Rabbit", subtitle: "Rabbit-shaped island · Japan", description: "An island outline resembling a crouching rabbit viewed from above.", lat: 34.283, lng: 132.998, zoom: 12.0 },

  { id: "cat_island", name: "Sleeping Cat", subtitle: "Cat-shaped island · Sudan", description: "The island outline resembles a curled-up sleeping cat.", lat: 18.240, lng: 33.921, zoom: 12.0 },
  { id: "shoe_lake", name: "The Shoe", subtitle: "Shoe-shaped lake · Kazakhstan", description: "A lake whose curved shoreline resembles a sneaker viewed from above.", lat: 49.282, lng: 76.320, zoom: 11.0 },
  { id: "whale_bay", name: "Blue Whale Bay", subtitle: "Whale-shaped bay · New Zealand", description: "The coastline forms the silhouette of a giant whale surfacing.", lat: -44.812, lng: 168.132, zoom: 10.0 },
  { id: "finger_lakes", name: "Fingerprints", subtitle: "Glacial lakes · USA", description: "Long parallel lakes resemble giant fingerprint ridges across the landscape.", lat: 42.662, lng: -76.812, zoom: 9.0 },
  { id: "owl_fields", name: "The Owl", subtitle: "Agricultural pattern · Saudi Arabia", description: "Circular irrigation fields align into a pattern resembling an owl face.", lat: 28.732, lng: 40.213, zoom: 10.0 },
  { id: "dragon_lake", name: "Dragon Lake", subtitle: "Dragon-shaped reservoir · China", description: "A winding reservoir outline resembles a flying dragon.", lat: 29.432, lng: 106.921, zoom: 10.0 },
  { id: "skull_desert", name: "Desert Skull", subtitle: "Eroded mountain formation · Chad", description: "Shadows and erosion patterns create the appearance of a giant skull.", lat: 20.912, lng: 17.228, zoom: 11.0 },
  { id: "leaf_island", name: "Floating Leaf", subtitle: "Leaf-shaped island · Finland", description: "A narrow island with branching edges resembling a maple leaf.", lat: 61.772, lng: 28.331, zoom: 12.0 },
  { id: "octopus_fields", name: "The Octopus", subtitle: "Road network pattern · Spain", description: "Roads extending from a central hub resemble octopus tentacles.", lat: 37.214, lng: -4.832, zoom: 11.0 },
  { id: "coffee_stain_delta", name: "Coffee Spill", subtitle: "Sediment delta · Brazil", description: "Dark sediment blooms resemble spilled coffee spreading across a table.", lat: -1.910, lng: -49.271, zoom: 8.0 },
  { id: "butterfly_farms", name: "Butterfly Wings", subtitle: "Symmetrical farmland · Ukraine", description: "Mirrored agricultural plots resemble butterfly wings from above.", lat: 48.392, lng: 31.822, zoom: 10.0 },
  { id: "tree_rivers", name: "Winter Trees", subtitle: "Frozen river network · Siberia", description: "Branching frozen rivers resemble leafless winter trees.", lat: 66.882, lng: 135.004, zoom: 7.0 },
  { id: "snake_road", name: "The Serpent Road", subtitle: "Mountain switchbacks · Chile", description: "A winding mountain road resembles a snake crawling across rock faces.", lat: -32.842, lng: -70.128, zoom: 12.0 },
  { id: "starfish_reef", name: "Starfish Reef", subtitle: "Radial coral formation · Maldives", description: "Coral structures spread outward like the arms of a starfish.", lat: 3.715, lng: 72.921, zoom: 12.0 },
  { id: "brain_coral", name: "Ocean Brain", subtitle: "Coral reef textures · Belize", description: "Complex reef ridges resemble the folds of a human brain.", lat: 17.221, lng: -87.561, zoom: 13.0 },
  { id: "richat_eye", name: "The Eye of the Sahara", subtitle: "Concentric desert formation · Mauritania", description: "A giant circular geological dome resembling a human eye, visible from space across the Sahara Desert.", lat: 21.124, lng: -11.401, zoom: 8.0 },
  { id: "dragon_blood_trees", name: "Alien Umbrellas", subtitle: "Dragon blood tree forest · Socotra, Yemen", description: "The iconic trees create mushroom-like canopies that look almost extraterrestrial from above.", lat: 12.463, lng: 53.823, zoom: 11.0 },

  { id: "ganges_delta", name: "Fractal Delta", subtitle: "River delta network · Bangladesh", description: "Braided waterways create organic branching patterns like veins or roots.", lat: 22.012, lng: 90.741, zoom: 7.0 },
  { id: "great_blue_hole", name: "Blue Abyss", subtitle: "Marine sinkhole · Belize", description: "A giant dark-blue circular hole surrounded by turquoise reef waters.", lat: 17.315, lng: -87.534, zoom: 12.0 },
  { id: "salinas_grid", name: "Salt Mosaic", subtitle: "Salt evaporation ponds · Bolivia", description: "Polygonal salt ponds form surreal reflective geometric patterns.", lat: -20.133, lng: -67.489, zoom: 10.0 },
  { id: "lake_hillier", name: "Pink Bubble", subtitle: "Pink saline lake · Australia", description: "A bright pink lake contrasting sharply against deep blue ocean.", lat: -34.094, lng: 123.202, zoom: 12.0 },
  { id: "kansas_labyrinth", name: "Patchwork Earth", subtitle: "Agricultural field patterns · USA", description: "Rectangular farmland grids resemble circuit boards from orbit.", lat: 39.011, lng: -100.129, zoom: 9.0 },
  { id: "island_fish_croatia", name: "The Fish Island", subtitle: "Fish-shaped island · Croatia", description: "An Adriatic island whose outline resembles a fish swimming offshore.", lat: 43.978, lng: 15.383, zoom: 12.0 },
  { id: "vltava_horseshoe", name: "River Horseshoe", subtitle: "River meander · Czech Republic", description: "A dramatic looping river bend resembling a horseshoe.", lat: 49.434, lng: 14.180, zoom: 11.0 },
  { id: "amazon_river_snake", name: "The Serpent", subtitle: "Meandering river system · Brazil", description: "Twisting Amazon tributaries resemble giant snakes weaving through rainforest.", lat: -3.465, lng: -62.215, zoom: 7.0 },
  { id: "nevada_spiral", name: "Spiral Jetty", subtitle: "Earthwork sculpture · USA", description: "A giant spiral artwork extending into Utah's Great Salt Lake.", lat: 41.437, lng: -112.667, zoom: 13.0 },

// ── Supabase ──────────────────────────────────────────────
const db = supabase.createClient(
  "https://noqkqcopjkkgugscymbr.supabase.co",
  "sb_publishable_IGIPKkuJKW57yMPl-AECZw_2a3-25ke"
);

// ── User objects ──────────────────────────────────────────
let userObjects = [];

async function loadUserObjects() {
  try {
    const { data, error } = await db.from("user_objects")
      .select("*").order("name", { ascending: true });
    if (error) throw error;

    // One-time migration: if Supabase is empty, upload whatever is in localStorage
    if (data.length === 0) {
      const local = JSON.parse(localStorage.getItem("earth_user_objects") || "[]");
      if (local.length > 0) {
        await db.from("user_objects").upsert(local.map(o => ({
          id: o.id, name: o.name,
          description: o.description || "",
          display_location: o.displayLocation || o.subtitle || "",
          lat: o.lat, lng: o.lng, zoom: o.zoom,
        })));
        return local.map(o => ({ ...o, source: "user" }));
      }
    }

    return data.map(r => ({
      id: r.id, name: r.name, description: r.description || "",
      displayLocation: r.display_location || "",
      lat: r.lat, lng: r.lng, zoom: r.zoom, source: "user",
    }));
  } catch {
    try { return JSON.parse(localStorage.getItem("earth_user_objects") || "[]"); }
    catch { return []; }
  }
}

async function persistObject(obj) {
  try {
    const { error } = await db.from("user_objects").upsert({
      id: obj.id, name: obj.name,
      description: obj.description || "",
      display_location: obj.displayLocation || "",
      lat: obj.lat, lng: obj.lng, zoom: obj.zoom,
    });
    if (error) throw error;
  } catch {
    localStorage.setItem("earth_user_objects", JSON.stringify(userObjects));
  }
}

function allObjects() { return [...userObjects]; }

// ── Sidebar rendering ─────────────────────────────────────
const list   = document.getElementById("objects-list");
const footer = document.getElementById("sidebar-footer");

function exportUserObjects() {
  const blob = new Blob([JSON.stringify(userObjects, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "earth-my-additions.json";
  a.click();
  URL.revokeObjectURL(url);
}

function renderSidebar() {
  list.innerHTML = "";
  userObjects.forEach(obj => {
    const card = document.createElement("div");
    card.className = "object-card";
    card.id = `card-${obj.id}`;
    const loc = getDisplayLocation(obj);
    const editBtn = obj.source === "user"
      ? `<span class="card-edit" onclick="event.stopPropagation();editObject('${obj.id}')">edit</span>`
      : "";
    card.innerHTML = `
      <div class="card-name">${obj.name}${editBtn}</div>
      ${obj.description ? `<div class="card-desc">${obj.description}</div>` : ""}
      <div class="card-where">
        ${loc ? `<div class="card-loc">· ${loc}</div>` : ""}
        <div class="card-coords">${formatCoord(obj.lat, "NS")} &nbsp; ${formatCoord(obj.lng, "EW")}</div>
      </div>
    `;
    card.addEventListener("click", () => selectObject(obj.id));
    list.appendChild(card);
  });
  footer.innerHTML = `${userObjects.length} objects &nbsp;·&nbsp; imagery © Esri &nbsp;·&nbsp; <span style="cursor:pointer;color:#3a3a3a" onmouseenter="this.style.color='#888'" onmouseleave="this.style.color='#3a3a3a'" onclick="exportUserObjects()">↓ export</span>`;
  if (selectedId) {
    const card = document.getElementById(`card-${selectedId}`);
    if (card) card.classList.add("selected");
  }
}

function getDisplayLocation(obj) {
  if (obj.source === "user") return obj.displayLocation || "";
  if (obj.subtitle) {
    const parts = obj.subtitle.split("·");
    return parts[parts.length - 1].trim();
  }
  return "";
}

function formatCoord(val, axis) {
  const dir = axis === "NS" ? (val >= 0 ? "N" : "S") : (val >= 0 ? "E" : "W");
  return `${Math.abs(val).toFixed(3)}° ${dir}`;
}

let selectedId = null;
loadUserObjects().then(data => { userObjects = data; renderSidebar(); renderMobileStrip(); });

// ── Map ───────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: "map",
  style: {
    version: 8,
    sources: {
      satellite: {
        type: "raster",
        tiles: [
          "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
        ],
        tileSize: 256,
        maxzoom: 19,
        attribution: "© Esri, Maxar, Earthstar Geographics",
      },
    },
    layers: [{
      id: "satellite",
      type: "raster",
      source: "satellite",
    }],
    projection: { type: "globe" },
  },
  projection: "globe",
  center: [20, 18],
  zoom: 1.6,
  maxZoom: 18,
  minZoom: 1,
  dragRotate: true,
  touchZoomRotate: true,
  cooperativeGestures: false,
  attributionControl: false,
});

map.on("load", () => {
  try { map.setProjection("globe"); } catch (_) {}

  try { map.touchZoomRotate.enableRotation(); } catch (_) {}

  try {
    map.setFog({
      range: [1, 10],
      color: "#0a0a0a",
      "high-color": "#080814",
      "horizon-blend": 0.03,
      "space-color": "#0a0a0a",
      "star-intensity": 0.25,
    });
  } catch (_) {}
});

// Compass needle tracks bearing
map.on("rotate", () => {
  document.getElementById("compass-needle").style.transform = `rotate(${map.getBearing()}deg)`;
});

// Live coordinates + reverse-geocoded location name
const coordsEl   = document.getElementById("coords");
const locationEl = document.getElementById("location-name");
let geocodeTimer = null;

function nomZoomFor(mapZoom) {
  if (mapZoom < 4) return 3;   // country
  if (mapZoom < 7) return 5;   // state / province
  return 10;                   // city / town (capped — never go to neighbourhood)
}

function pickLabel(addr, nomZoom) {
  const country = addr.country || "";
  if (nomZoom <= 3) return country;
  if (nomZoom <= 5) {
    const state = addr.state || addr.region || "";
    return [state, country].filter(Boolean).join(", ");
  }
  const city = addr.city || addr.town || addr.village || addr.municipality || addr.county || addr.state || "";
  return [city, country].filter(Boolean).join(", ");
}

async function fetchLocation(lat, lng) {
  const nz = nomZoomFor(map.getZoom());
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=${nz}`,
      { headers: { "Accept-Language": "en" } }
    );
    const data = await res.json();
    const label = pickLabel(data.address || {}, nz);
    locationEl.classList.remove("fading");
    locationEl.textContent = label;
  } catch (_) {}
}

map.on("mousemove", (e) => {
  const { lat, lng } = e.lngLat;
  const la = `${Math.abs(lat).toFixed(4)}° ${lat >= 0 ? "N" : "S"}`;
  const lo = `${Math.abs(lng).toFixed(4)}° ${lng >= 0 ? "E" : "W"}`;
  coordsEl.textContent = `${la}  ${lo}`;

  locationEl.classList.add("fading");
  clearTimeout(geocodeTimer);
  geocodeTimer = setTimeout(() => fetchLocation(lat, lng), 500);
});

map.on("mouseleave", () => {
  coordsEl.textContent = "— °  — °";
  clearTimeout(geocodeTimer);
  locationEl.classList.remove("fading");
  locationEl.textContent = "";
});

// ── Selection ─────────────────────────────────────────────
function selectObject(id) {
  const obj = allObjects().find(o => o.id === id);
  if (!obj) return;

  if (selectedId && selectedId !== id) {
    const prev = document.getElementById(`card-${selectedId}`);
    if (prev) prev.classList.remove("selected");
  }

  const alreadySelected = selectedId === id;
  selectedId = id;
  const card = document.getElementById(`card-${id}`);
  if (card) card.classList.add("selected");

  if (!alreadySelected) {
    map.flyTo({
      center: [obj.lng, obj.lat],
      zoom: obj.zoom,
      duration: 2800,
      curve: 1.42,
      essential: true,
    });
  }
}

// ── Edit existing user object ─────────────────────────────
let editingId = null;

function editObject(id) {
  const obj = userObjects.find(o => o.id === id);
  if (!obj) return;
  editingId = id;
  document.getElementById("add-form-title").textContent = "Edit object";
  document.getElementById("add-form-meta").textContent =
    `${formatCoord(obj.lat, "NS")}  ${formatCoord(obj.lng, "EW")}  ·  zoom ${obj.zoom}`;
  document.getElementById("form-name").value = obj.name;
  document.getElementById("form-desc").value = obj.description || "";
  document.getElementById("add-modal").classList.remove("hidden");
  setTimeout(() => document.getElementById("form-name").focus(), 50);
}

// ── Add mode ──────────────────────────────────────────────
let addMode = false;
let pendingAdd = null;

function toggleAddMode() {
  addMode = !addMode;
  document.getElementById("add-bar-btn").classList.toggle("active", addMode);
  map.getCanvas().style.cursor = addMode ? "crosshair" : "";
  document.getElementById("add-hint").style.display = addMode ? "block" : "none";
}

map.on("click", async (e) => {
  if (!addMode) return;

  const { lat, lng } = e.lngLat;
  const zoom = parseFloat(map.getZoom().toFixed(1));
  pendingAdd = { lat, lng, zoom };

  document.getElementById("add-form-meta").textContent =
    `${formatCoord(lat, "NS")}  ${formatCoord(lng, "EW")}  ·  zoom ${zoom}`;
  document.getElementById("form-name").value = "";
  document.getElementById("form-desc").value = "";
  document.getElementById("add-modal").classList.remove("hidden");
  setTimeout(() => document.getElementById("form-name").focus(), 50);

  // Reverse geocode in background — store location for saving
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=10`,
      { headers: { "Accept-Language": "en" } }
    );
    const data = await res.json();
    const addr = data.address || {};
    const place = addr.city || addr.town || addr.village || addr.county || addr.state || "";
    const country = addr.country || "";
    pendingAdd.displayLocation = [place, country].filter(Boolean).join(", ");
  } catch (_) {}
});

async function saveObject() {
  const name = document.getElementById("form-name").value.trim();
  if (!name) { document.getElementById("form-name").focus(); return; }
  const description = document.getElementById("form-desc").value.trim();

  if (editingId) {
    const obj = userObjects.find(o => o.id === editingId);
    if (obj) { obj.name = name; obj.description = description; }
    const id = editingId;
    await persistObject(obj);
    closeAddForm();
    renderSidebar();
    selectObject(id);
    return;
  }

  if (!pendingAdd) return;
  const newObj = {
    id: "user_" + Date.now(),
    name,
    displayLocation: pendingAdd.displayLocation || "",
    description,
    lat: pendingAdd.lat,
    lng: pendingAdd.lng,
    zoom: pendingAdd.zoom,
    source: "user",
  };
  userObjects.unshift(newObj);
  await persistObject(newObj);
  closeAddForm();
  renderSidebar();
  selectObject(newObj.id);
}

function closeAddForm() {
  document.getElementById("add-modal").classList.add("hidden");
  document.getElementById("add-form-title").textContent = "New object";
  pendingAdd = null;
  editingId = null;
}

// ── Mobile card strip ─────────────────────────────────────
function renderMobileStrip() {
  const container = document.getElementById("mobile-cards");
  const locationLabel = document.getElementById("mobile-location-label");
  if (!container) return;
  container.innerHTML = "";

  userObjects.forEach((obj, i) => {
    const card = document.createElement("div");
    card.className = "mobile-card" + (i === 0 ? " active" : "");
    card.dataset.id = obj.id;
    card.innerHTML = `
      <div class="mobile-card-name">${obj.name}</div>
      ${obj.description ? `<div class="mobile-card-desc">${obj.description}</div>` : ""}
    `;
    container.appendChild(card);
  });

  if (userObjects[0]) {
    locationLabel.textContent = userObjects[0].displayLocation || "";
    map.flyTo({ center: [userObjects[0].lng, userObjects[0].lat], zoom: userObjects[0].zoom, duration: 1800, curve: 1.2, essential: true });
  }

  let scrollTimer;
  container.addEventListener("scroll", () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
      const containerRect = container.getBoundingClientRect();
      const viewCenter = containerRect.left + containerRect.width / 2;
      let closest = null, closestDist = Infinity;
      container.querySelectorAll(".mobile-card").forEach(card => {
        const rect = card.getBoundingClientRect();
        const dist = Math.abs((rect.left + rect.width / 2) - viewCenter);
        if (dist < closestDist) { closestDist = dist; closest = card; }
      });
      if (!closest) return;
      const obj = userObjects.find(o => o.id === closest.dataset.id);
      if (!obj) return;
      container.querySelectorAll(".mobile-card").forEach(c => c.classList.remove("active"));
      closest.classList.add("active");
      locationLabel.textContent = obj.displayLocation || "";
      map.flyTo({ center: [obj.lng, obj.lat], zoom: obj.zoom, duration: 1800, curve: 1.2, essential: true });
    }, 80);
  });
}

document.addEventListener("keydown", (e) => {
  if (document.getElementById("add-modal").classList.contains("hidden")) return;
  if (e.key === "Escape") closeAddForm();
  if (e.key === "Enter") saveObject();
});
</script>
